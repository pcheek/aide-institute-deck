<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_preview.css">
<style>
  .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: center; }
  .wheel { background: var(--bg-subtle); border-radius: 12px; padding: 10px; display: flex; align-items: center; justify-content: center; }
  .wheel img { width: 100%; height: auto; display: block; }
  .legend { display: flex; flex-direction: column; gap: 8px; }
  .item { display: grid; grid-template-columns: 14px 1fr; gap: 10px; align-items: center; font-size: 11.5px; color: var(--color-navy); }
  .item .swatch { width: 14px; height: 14px; border-radius: 3px; }
  .item b { font-weight: 700; font-family: var(--font-display); }
  .item .role { color: var(--fg-secondary); font-family: var(--font-primary); }
</style></head>
<body><div class="pv">
  <div class="wrap">
    <div class="wheel">
      <img src="../assets/marketing/aide-brand-wheel.png" alt="AIDE brand wheel — six sub-brands around the AIDE Institute center">
    </div>
    <div class="legend">
      <div class="item"><div class="swatch" style="background:#E600FF"></div><div><b>AIDE Index</b> <span class="role">· Research</span></div></div>
      <div class="item"><div class="swatch" style="background:#FF7A00"></div><div><b>AIDE Rankings</b> <span class="role">· AIDE50</span></div></div>
      <div class="item"><div class="swatch" style="background:#7B2FFF"></div><div><b>AIDE Awards</b> <span class="role">· Excellence</span></div></div>
      <div class="item"><div class="swatch" style="background:#5CFFC8"></div><div><b>AIDE Insights</b> <span class="role">· Publishing</span></div></div>
      <div class="item"><div class="swatch" style="background:#FF47C2"></div><div><b>AIDE Education</b> <span class="role">· Academia</span></div></div>
      <div class="item"><div class="swatch" style="background:#00E5A0"></div><div><b>AIDE Talent</b> <span class="role">· Recruiting</span></div></div>
    </div>
  </div>
</div></body></html>
