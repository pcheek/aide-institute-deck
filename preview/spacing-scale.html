<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_preview.css">
<style>
  .rows { display: flex; flex-direction: column; gap: 8px; }
  .row { display: grid; grid-template-columns: 80px 1fr; align-items: center; gap: 16px; }
  .row__bar { background: var(--color-navy); height: 16px; border-radius: 2px; }
  .row__meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-secondary); }
</style></head>
<body><div class="pv">
  <div class="rows">
    <div class="row"><div class="row__bar" style="width:4px"></div><div class="row__meta">space-1 · 4px</div></div>
    <div class="row"><div class="row__bar" style="width:8px"></div><div class="row__meta">space-2 · 8px</div></div>
    <div class="row"><div class="row__bar" style="width:12px"></div><div class="row__meta">space-3 · 12px</div></div>
    <div class="row"><div class="row__bar" style="width:16px"></div><div class="row__meta">space-4 · 16px</div></div>
    <div class="row"><div class="row__bar" style="width:20px"></div><div class="row__meta">space-5 · 20px</div></div>
    <div class="row"><div class="row__bar" style="width:24px"></div><div class="row__meta">space-6 · 24px</div></div>
    <div class="row"><div class="row__bar" style="width:32px"></div><div class="row__meta">space-8 · 32px</div></div>
    <div class="row"><div class="row__bar" style="width:48px"></div><div class="row__meta">space-12 · 48px</div></div>
    <div class="row"><div class="row__bar" style="width:80px"></div><div class="row__meta">space-20 · 80px</div></div>
    <div class="row"><div class="row__bar" style="width:100px"></div><div class="row__meta">space-24 · 100px</div></div>
  </div>
</div></body></html>
