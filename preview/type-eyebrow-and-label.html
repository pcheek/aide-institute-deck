<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_preview.css">
<style>
  .eb { font-family: var(--font-primary); color: var(--accent-label); font-weight: 700; text-transform: uppercase; }
  .group { display: flex; flex-direction: column; gap: 6px; padding: 14px 16px; background: var(--bg-subtle); border-radius: 8px; }
  .group + .group { margin-top: 4px; }
  .ex { font-family: var(--font-display); color: var(--color-navy); font-weight: 700; font-size: 22px; letter-spacing: -0.2px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-secondary); }
  .dot { width: 6px; height: 6px; background: var(--color-fuchsia); border-radius: 50%; display: inline-block; margin: 0 8px; vertical-align: middle; }
</style></head>
<body><div class="pv">
  <div class="group">
    <div class="eb" style="font-size:13px;letter-spacing:2.5px">AIDE Index<span class="dot"></span>Q1 2026</div>
    <div class="meta">on-light eyebrow · Inter 13 / 700 / +2.5px</div>
  </div>
  <div class="group">
    <div class="eb" style="font-size:11px;letter-spacing:3.5px;color:rgba(255,255,255,0.55);background:var(--color-navy);padding:8px 12px;border-radius:4px;display:inline-block;align-self:flex-start">Sector Report<span class="dot"></span>March 2026</div>
    <div class="meta">on-navy eyebrow · Inter 11 / 700 / +3.5px · white 55%</div>
  </div>
  <div class="group">
    <div class="ex">Section Heading</div>
    <div class="meta">heading · Space Grotesk 22 / 700 / -0.2px</div>
  </div>
</div></body></html>
