<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_preview.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .ex { background: var(--bg-subtle); border-radius: 8px; padding: 18px 22px; min-height: 130px; display: flex; flex-direction: column; justify-content: space-between; }
  .stat { position: relative; padding-left: 18px; }
  .stat::before { content:''; position: absolute; left:0; top:6px; bottom:6px; width:4px; background:#E600FF; border-radius:2px; }
  .stat__num { font-size: 44px; font-weight: 900; color: var(--color-navy); line-height: 1; letter-spacing: -1px; }
  .stat__cap { font-size: 11px; color: var(--fg-secondary); margin-top: 4px; }
  .hbar { display: flex; align-items: center; gap: 14px; }
  .hbar__bar { height: 3px; background: #E600FF; width: 48px; }
  .hbar__txt { font-size: 14px; font-weight: 700; color: var(--color-navy); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-secondary); }
</style></head>
<body><div class="pv">
  <div class="grid">
    <div class="ex">
      <div class="stat">
        <div class="stat__num">42</div>
        <div class="stat__cap">Leadership score</div>
      </div>
      <div class="meta">4px wide · vertical · radius 2px</div>
    </div>
    <div class="ex">
      <div class="hbar">
        <div class="hbar__bar"></div>
        <div class="hbar__txt">Felipe Scherer</div>
      </div>
      <div class="meta">3px tall · horizontal · 48px wide default</div>
    </div>
  </div>
  <div class="pv-meta">Fuchsia accent bars — the single most recognizable AIDE mark.</div>
</div></body></html>
