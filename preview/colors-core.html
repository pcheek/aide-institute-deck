<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_preview.css">
<style>
  .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .sw__chip { height: 84px; border-radius: 6px; border: 1px solid var(--border-subtle); }
  .sw__name { font-size: 13px; font-weight: 700; color: var(--color-navy); }
  .sw__hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-secondary); }
</style></head>
<body><div class="pv">
  <div class="swatches">
    <div class="sw"><div class="sw__chip" style="background:#1B2541"></div><div class="sw__name">Navy</div><div class="sw__hex">#1B2541</div></div>
    <div class="sw"><div class="sw__chip" style="background:#3B82F6"></div><div class="sw__name">Blue</div><div class="sw__hex">#3B82F6</div></div>
    <div class="sw"><div class="sw__chip" style="background:#7C3AED"></div><div class="sw__name">Violet</div><div class="sw__hex">#7C3AED</div></div>
    <div class="sw"><div class="sw__chip" style="background:#E600FF"></div><div class="sw__name">Fuchsia</div><div class="sw__hex">#E600FF</div></div>
    <div class="sw"><div class="sw__chip" style="background:#1A1A1A"></div><div class="sw__name">Ink</div><div class="sw__hex">#1A1A1A</div></div>
    <div class="sw"><div class="sw__chip" style="background:#777777"></div><div class="sw__name">Mid Gray</div><div class="sw__hex">#777777</div></div>
    <div class="sw"><div class="sw__chip" style="background:#F8F9FB;border:1px solid var(--border-muted)"></div><div class="sw__name">Light Gray</div><div class="sw__hex">#F8F9FB</div></div>
    <div class="sw"><div class="sw__chip" style="background:#FFFFFF;border:1px solid var(--border-muted)"></div><div class="sw__name">White</div><div class="sw__hex">#FFFFFF</div></div>
  </div>
</div></body></html>
