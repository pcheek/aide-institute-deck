<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_preview.css">
<style>
  body { background: #2a2a2a; }
  .frame { width: 640px; margin: 0 auto; border-radius: 6px; overflow: hidden; }
  .h { background: #1B2541; padding: 14px 22px; display: flex; justify-content: space-between; align-items: center; }
  .h__logo { height: 28px; width: auto; }
  .h__eb { color: rgba(255,255,255,0.55); font-size: 9px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
  .h__dot { width: 5px; height: 5px; background: #E600FF; border-radius: 50%; }
  .b { background: #fff; padding: 28px 22px; display: flex; flex-direction: column; gap: 6px; }
  .b__stat { font-family: var(--font-display); font-size: 56px; font-weight: 700; color: #E600FF; line-height: 0.9; letter-spacing: -1.5px; }
  .b__claim { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: #1B2541; line-height: 1.2; }
  .f { background: #F8F9FB; border-top: 1px solid #EBEBEF; padding: 10px 22px; display: flex; justify-content: space-between; align-items: center; }
  .f__tag { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #7C3AED; }
  .f__url { font-size: 10px; font-weight: 700; color: #1B2541; }
  .annot { color: rgba(255,255,255,0.5); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; text-align: center; margin-top: 2px; }
</style></head>
<body><div class="pv pv--dark" style="background:#2a2a2a;padding:18px 28px">
  <div class="frame">
    <div class="h">
      <img class="h__logo" src="../assets/aide-logo-mono-white.png" alt="AIDE">
      <div class="h__eb"><span>AIDE Index</span><span class="h__dot"></span><span>Q1 2026</span></div>
    </div>
    <div class="b">
      <div class="b__stat">37%</div>
      <div class="b__claim">Only 1 in 3 executives demonstrate measurable AI literacy.</div>
    </div>
    <div class="f">
      <div class="f__tag">Tracking the AI that counts.</div>
      <div class="f__url">aideinstitute.com</div>
    </div>
  </div>
  <div class="annot">Header band · Light content · Footer band</div>
</div></body></html>
