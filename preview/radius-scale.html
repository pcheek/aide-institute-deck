<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_preview.css">
<style>
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .cell { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .cell__chip { width: 100%; height: 84px; background: var(--bg-subtle); border: 1px solid var(--border-subtle); }
  .cell__meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-secondary); }
  .cell__use { font-size: 11px; color: var(--color-navy); text-align: center; }
</style></head>
<body><div class="pv">
  <div class="row">
    <div class="cell"><div class="cell__chip" style="border-radius:4px"></div><div class="cell__meta">sm · 4px</div><div class="cell__use">code, chips</div></div>
    <div class="cell"><div class="cell__chip" style="border-radius:6px"></div><div class="cell__meta">md · 6px</div><div class="cell__use">swatches</div></div>
    <div class="cell"><div class="cell__chip" style="border-radius:8px"></div><div class="cell__meta">lg · 8px</div><div class="cell__use">example rows</div></div>
    <div class="cell"><div class="cell__chip" style="border-radius:10px"></div><div class="cell__meta">xl · 10px</div><div class="cell__use">code blocks</div></div>
    <div class="cell"><div class="cell__chip" style="border-radius:12px"></div><div class="cell__meta">2xl · 12px</div><div class="cell__use">cards, panels</div></div>
  </div>
</div></body></html>
