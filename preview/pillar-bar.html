<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_preview.css">
<style>

  .c__name { font-size: 16px; font-weight: 900; letter-spacing: 2px; }
  .c__verb { font-size: 10px; font-weight: 700; letter-spacing: 2.5px; opacity: 0.85; }
  .legend { font-size: 11px; color: var(--fg-secondary); }
</style></head>
<body><div class="pv">
  <div class="bar">
    <div class="c" style="background:#4ADE80;color:#1B2541"><div class="c__name">LITERACY</div><div class="c__verb">KNOW</div></div>
    <div class="c" style="background:#A78BFA;color:#1B2541"><div class="c__name">ADVOCACY</div><div class="c__verb">SAY</div></div>
    <div class="c" style="background:#D946EF;color:#fff"><div class="c__name">ORIENTATION</div><div class="c__verb">PRIORITIZE</div></div>
    <div class="c" style="background:#FBBF24;color:#1B2541"><div class="c__name">IMPLEMENTATION</div><div class="c__verb">BUILD</div></div>
  </div>
  <div class="legend">4-column flush bar · radius 12px · the canonical methodology lockup.</div>
</div></body></html>
