<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_preview.css">
<style>
  .sb { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .row { display: grid; grid-template-columns: 1fr 92px; align-items: center; gap: 14px; padding: 12px 14px; background: var(--bg-subtle); border-radius: 8px; border: 1px solid var(--border-subtle); }
  .row__logo { height: 28px; width: auto; max-width: 100%; object-fit: contain; object-position: left center; }
  .row__hex { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
  .row__chip { width: 18px; height: 18px; border-radius: 4px; border: 1px solid var(--border-subtle); }
  .row__txt { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-secondary); }
</style></head>
<body><div class="pv">
  <div class="sb">
    <div class="row"><img class="row__logo" src="../assets/sub-brands/aide-index-logo.png" alt="AIDE Index"><div class="row__hex"><div class="row__chip" style="background:#E600FF"></div><div class="row__txt">#E600FF</div></div></div>
    <div class="row"><img class="row__logo" src="../assets/sub-brands/aide-insights-logo.png" alt="AIDE Insights"><div class="row__hex"><div class="row__chip" style="background:#5CFFC8"></div><div class="row__txt">#5CFFC8</div></div></div>
    <div class="row"><img class="row__logo" src="../assets/sub-brands/aide-rankings-logo.png" alt="AIDE Rankings"><div class="row__hex"><div class="row__chip" style="background:#FF7A00"></div><div class="row__txt">#FF7A00</div></div></div>
    <div class="row"><img class="row__logo" src="../assets/sub-brands/aide-awards-logo.png" alt="AIDE Awards"><div class="row__hex"><div class="row__chip" style="background:#7B2FFF"></div><div class="row__txt">#7B2FFF</div></div></div>
    <div class="row"><img class="row__logo" src="../assets/sub-brands/aide-education-logo.png" alt="AIDE Education"><div class="row__hex"><div class="row__chip" style="background:#FF47C2"></div><div class="row__txt">#FF47C2</div></div></div>
    <div class="row"><img class="row__logo" src="../assets/sub-brands/aide-talent-logo.png" alt="AIDE Talent"><div class="row__hex"><div class="row__chip" style="background:#00E5A0"></div><div class="row__txt">#00E5A0</div></div></div>
  </div>
  <div class="pv-meta">Each sub-brand uses the navy AIDE wordmark + its own colored product name. Never mix with methodology pillar colors.</div>
</div></body></html>
