<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_preview.css">
<style>
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .person { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  .photo { width: 100%; aspect-ratio: 1; border-radius: 12px; overflow: hidden; background: var(--bg-subtle); position: relative; }
  .photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo::after { content: ''; position: absolute; left: 12px; bottom: 12px; width: 22px; height: 3px; background: var(--color-fuchsia); }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--color-navy); letter-spacing: -0.2px; }
  .role { font-family: var(--font-primary); font-size: 11px; color: var(--fg-secondary); line-height: 1.4; }
</style></head>
<body><div class="pv">
  <div class="row">
    <div class="person">
      <div class="photo"><img src="../assets/team/paul-cheek.png" alt="Dr. Paul Cheek"></div>
      <div class="name">Dr. Paul Cheek</div>
      <div class="role">Co-Founder, AIDE Institute</div>
    </div>
    <div class="person">
      <div class="photo"><img src="../assets/team/felipe-scherer.jpg" alt="Felipe Scherer"></div>
      <div class="name">Felipe Scherer</div>
      <div class="role">Co-Founder &amp; Chief Researcher</div>
    </div>
    <div class="person">
      <div class="photo"><img src="../assets/team/kate-reed.jpg" alt="Kate Reed"></div>
      <div class="name">Kate Reed</div>
      <div class="role">Co-Founder &amp; Head of Insights</div>
    </div>
  </div>
  <div class="pv-meta">Square crop · radius 12 · fuchsia accent bar bottom-left for brand consistency.</div>
</div></body></html>
