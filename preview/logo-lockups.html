<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_preview.css">
<style>
  .top { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .frame { border-radius: 10px; padding: 18px 18px; display: flex; flex-direction: column; gap: 8px; align-items: center; justify-content: center; min-height: 110px; }
  .frame--light { background: var(--bg-subtle); }
  .frame--dark  { background: var(--color-navy); }
  .frame img { max-height: 44px; width: auto; max-width: 88%; object-fit: contain; }
  .lab { font-family: var(--font-mono); font-size: 9.5px; color: var(--fg-secondary); letter-spacing: 0.4px; }
  .frame--dark .lab { color: rgba(255,255,255,0.55); }
  .bottom { display: grid; grid-template-columns: 96px 96px 1fr; gap: 10px; align-items: stretch; }
  .amark, .amark--dark, .clear { border-radius: 10px; display: flex; align-items: center; justify-content: center; min-height: 96px; }
  .amark { background: var(--bg-subtle); }
  .amark--dark { background: var(--color-navy); }
  .amark img, .amark--dark img { width: 48px; height: auto; }
  .clear { background: var(--bg-subtle); padding: 12px; position: relative; }
  .clear__outline { display: flex; align-items: center; justify-content: center; padding: 16px 22px; border: 1px dashed var(--accent-label); border-radius: 6px; }
  .clear__outline img { height: 30px; width: auto; }
  .clear__lab { position: absolute; left: 8px; bottom: 6px; font-family: var(--font-mono); font-size: 9.5px; color: var(--fg-secondary); }
</style></head>
<body><div class="pv">
  <div class="top">
    <div class="frame frame--light">
      <img src="../assets/aide-logo-horizontal.png" alt="AIDE Institute">
      <div class="lab">primary · on light</div>
    </div>
    <div class="frame frame--dark">
      <img src="../assets/aide-logo-mono-white.png" alt="AIDE Institute">
      <div class="lab">mono white · on navy</div>
    </div>
  </div>
  <div class="bottom">
    <div class="amark"><img src="../assets/aide-favicon.png" alt="A-mark"></div>
    <div class="amark--dark"><img src="../assets/aide-favicon.png" alt="A-mark" style="filter:brightness(0) invert(1)"></div>
    <div class="clear">
      <div class="clear__outline"><img src="../assets/aide-favicon.png" alt=""></div>
      <div class="clear__lab">clearspace · 1× A-height on all sides · min 24px digital</div>
    </div>
  </div>
</div></body></html>
