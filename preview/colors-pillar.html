<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_preview.css">
<style>
  .pillars { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border-radius: 12px; overflow: hidden; }
  .p { padding: 22px 16px; display: flex; flex-direction: column; gap: 4px; align-items: center; text-align: center; }
  .p__name { font-size: 13px; font-weight: 900; letter-spacing: 2px; }
  .p__verb { font-size: 10px; font-weight: 700; letter-spacing: 2.5px; opacity: 0.75; }
  .p__hex { font-family: var(--font-mono); font-size: 10px; margin-top: 8px; opacity: 0.7; }
  .legend { font-size: 12px; color: var(--fg-secondary); }
</style></head>
<body><div class="pv">
  <div class="pillars">
    <div class="p" style="background:#4ADE80;color:#1B2541">
      <div class="p__name">LITERACY</div><div class="p__verb">KNOW</div><div class="p__hex">#4ADE80</div>
    </div>
    <div class="p" style="background:#A78BFA;color:#1B2541">
      <div class="p__name">ADVOCACY</div><div class="p__verb">SAY</div><div class="p__hex">#A78BFA</div>
    </div>
    <div class="p" style="background:#D946EF;color:#fff">
      <div class="p__name">ORIENTATION</div><div class="p__verb">PRIORITIZE</div><div class="p__hex">#D946EF</div>
    </div>
    <div class="p" style="background:#FBBF24;color:#1B2541">
      <div class="p__name">IMPLEMENTATION</div><div class="p__verb">BUILD</div><div class="p__hex">#FBBF24</div>
    </div>
  </div>
  <div class="legend">AIDE Index methodology only. Never mix with sub-brand palette.</div>
</div></body></html>
